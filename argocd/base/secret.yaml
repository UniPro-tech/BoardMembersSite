---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: boardmembers-secret
  namespace: boardmembers
spec:
  encryptedData:
    BETTER_AUTH_SECRET: 
    BETTER_AUTH_URL: 
    DATABASE_URL: 
    NEXT_PUBLIC_BETTER_AUTH_URL: 
    UNIQUE_CLIENT_ID: 
    UNIQUE_CLIENT_SECRET: 
  template:
    metadata:
      name: boardmembers-secret
      namespace: boardmembers
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-secret
  namespace: boardmembers
spec:
  encryptedData:
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: postgres-secret
      namespace: boardmembers
    type: Opaque
