apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardmembers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boardmembers
  template:
    metadata:
      labels:
        app: boardmembers
    spec:
      containers:
        - name: boardmembers
          image: registry.uniproject.jp/infra/boardmembers:1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: boardmembers-secret
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 30
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m # 必要最低限の0.1CPUを確保
              memory: 512Mi # 必要最低限の512MiBを確保
            limits:
              cpu: 500m # 最大0.5CPUまで使用可能
              memory: 1Gi # 最大1GiBまで使用可能
      imagePullSecrets:
        - name: internal-harbor
